<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Galmuri11&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { margin: 0; font-family: 'Galmuri11', monospace, sans-serif; }
.card {
  width: 600px;
  height: 300px;
  background: #1a1a2e;
  border: 4px solid #533483;
  display: flex;
  align-items: center;
  justify-content: center;
}
.inner {
  border: none;
  padding: 30px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.emoji { font-size: 48px; line-height: 1; }
.label { color: #6bcb77; font-size: 14px; letter-spacing: 4px; }
.title { color: #f9d423; font-size: 24px; }
.subtitle { color: #a0a0b0; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
  <div class="inner">
    <div class="emoji">🥳</div>
    <div class="label">QUEST COMPLETE</div>
    <div class="title">모험 리포트 완성! ⭐</div>
  </div>
</div>
</body>
</html>
